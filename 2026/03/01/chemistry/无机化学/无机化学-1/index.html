    <div class="post-body" itemprop="articleBody"><h1 id="光谱元素周期表"><a href="#光谱元素周期表" class="headerlink" title="光谱元素周期表"></a>光谱元素周期表</h1><p><img src="/img/chemistry/%E6%97%A0%E6%9C%BA%E5%8C%96%E5%AD%A6/1-%E5%85%89%E8%B0%B1%E5%85%83%E7%B4%A0%E5%91%A8%E6%9C%9F%E8%A1%A8.png" alt="光谱元素周期表"></p>
<h1 id="源码"><a href="#源码" class="headerlink" title="源码"></a>源码</h1><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">import matplotlib.pyplot as plt</span><br><span class="line">import numpy as np</span><br><span class="line">import time</span><br><span class="line">from astroquery.nist import Nist</span><br><span class="line">import astropy.units as u</span><br><span class="line"></span><br><span class="line"># 1. 内置 IUPAC 118 元素符号表 (零依赖)</span><br><span class="line">SYMBOLS = [</span><br><span class="line">    &quot;H&quot;, &quot;He&quot;, &quot;Li&quot;, &quot;Be&quot;, &quot;B&quot;, &quot;C&quot;, &quot;N&quot;, &quot;O&quot;, &quot;F&quot;, &quot;Ne&quot;, &quot;Na&quot;, &quot;Mg&quot;, &quot;Al&quot;, &quot;Si&quot;, &quot;P&quot;, &quot;S&quot;, &quot;Cl&quot;, &quot;Ar&quot;,</span><br><span class="line">    &quot;K&quot;, &quot;Ca&quot;, &quot;Sc&quot;, &quot;Ti&quot;, &quot;V&quot;, &quot;Cr&quot;, &quot;Mn&quot;, &quot;Fe&quot;, &quot;Co&quot;, &quot;Ni&quot;, &quot;Cu&quot;, &quot;Zn&quot;, &quot;Ga&quot;, &quot;Ge&quot;, &quot;As&quot;, &quot;Se&quot;, &quot;Br&quot;, &quot;Kr&quot;,</span><br><span class="line">    &quot;Rb&quot;, &quot;Sr&quot;, &quot;Y&quot;, &quot;Zr&quot;, &quot;Nb&quot;, &quot;Mo&quot;, &quot;Tc&quot;, &quot;Ru&quot;, &quot;Rh&quot;, &quot;Pd&quot;, &quot;Ag&quot;, &quot;Cd&quot;, &quot;In&quot;, &quot;Sn&quot;, &quot;Sb&quot;, &quot;Te&quot;, &quot;I&quot;, &quot;Xe&quot;,</span><br><span class="line">    &quot;Cs&quot;, &quot;Ba&quot;, &quot;La&quot;, &quot;Ce&quot;, &quot;Pr&quot;, &quot;Nd&quot;, &quot;Pm&quot;, &quot;Sm&quot;, &quot;Eu&quot;, &quot;Gd&quot;, &quot;Tb&quot;, &quot;Dy&quot;, &quot;Ho&quot;, &quot;Er&quot;, &quot;Tm&quot;, &quot;Yb&quot;, &quot;Lu&quot;,</span><br><span class="line">    &quot;Hf&quot;, &quot;Ta&quot;, &quot;W&quot;, &quot;Re&quot;, &quot;Os&quot;, &quot;Ir&quot;, &quot;Pt&quot;, &quot;Au&quot;, &quot;Hg&quot;, &quot;Tl&quot;, &quot;Pb&quot;, &quot;Bi&quot;, &quot;Po&quot;, &quot;At&quot;, &quot;Rn&quot;,</span><br><span class="line">    &quot;Fr&quot;, &quot;Ra&quot;, &quot;Ac&quot;, &quot;Th&quot;, &quot;Pa&quot;, &quot;U&quot;, &quot;Np&quot;, &quot;Pu&quot;, &quot;Am&quot;, &quot;Cm&quot;, &quot;Bk&quot;, &quot;Cf&quot;, &quot;Es&quot;, &quot;Fm&quot;, &quot;Md&quot;, &quot;No&quot;, &quot;Lr&quot;,</span><br><span class="line">    &quot;Rf&quot;, &quot;Db&quot;, &quot;Sg&quot;, &quot;Bh&quot;, &quot;Hs&quot;, &quot;Mt&quot;, &quot;Ds&quot;, &quot;Rg&quot;, &quot;Cn&quot;, &quot;Nh&quot;, &quot;Fl&quot;, &quot;Mc&quot;, &quot;Lv&quot;, &quot;Ts&quot;, &quot;Og&quot;</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line">def get_periodic_coords(z):</span><br><span class="line">    &quot;&quot;&quot;返回标准周期表坐标 (row, col)&quot;&quot;&quot;</span><br><span class="line">    if z == 1: return 0, 0</span><br><span class="line">    if z == 2: return 0, 17</span><br><span class="line">    if 3 &lt;= z &lt;= 10: return 1, (z-3) if z &lt;= 4 else (z+7)</span><br><span class="line">    if 11 &lt;= z &lt;= 18: return 2, (z-11) if z &lt;= 12 else (z-1)</span><br><span class="line">    if 19 &lt;= z &lt;= 36: return 3, z-19</span><br><span class="line">    if 37 &lt;= z &lt;= 54: return 4, z-37</span><br><span class="line">    if 55 &lt;= z &lt;= 56: return 5, z-55</span><br><span class="line">    if 57 &lt;= z &lt;= 71: return 8, z-57+3 # 镧系</span><br><span class="line">    if 72 &lt;= z &lt;= 86: return 5, z-69</span><br><span class="line">    if 87 &lt;= z &lt;= 88: return 6, z-87</span><br><span class="line">    if 89 &lt;= z &lt;= 103: return 9, z-89+3 # 锕系</span><br><span class="line">    if 104 &lt;= z &lt;= 118: return 6, z-101</span><br><span class="line">    return None, None</span><br><span class="line"></span><br><span class="line">def wavelength_to_rgb(wl):</span><br><span class="line">    &quot;&quot;&quot;科研级色彩转换：将380-750nm映射到可见光谱&quot;&quot;&quot;</span><br><span class="line">    rel = (wl - 380) / (750 - 380)</span><br><span class="line">    # 使用 gist_rainbow 镜像，使红色在右侧，紫色在左侧</span><br><span class="line">    return plt.cm.gist_rainbow(1 - rel)</span><br><span class="line"></span><br><span class="line">def fetch_nist_data(symbol):</span><br><span class="line">    &quot;&quot;&quot;多级电离态查询逻辑：增加成功率&quot;&quot;&quot;</span><br><span class="line">    for ion in [&quot;I&quot;, &quot;II&quot;, &quot;III&quot;]: # 依次查询中性、一级电离、二级电离</span><br><span class="line">        try:</span><br><span class="line">            result = Nist.query(380*u.nm, 750*u.nm, linename=f&quot;&#123;symbol&#125; &#123;ion&#125;&quot;)</span><br><span class="line">            if result is not None and len(result) &gt; 0:</span><br><span class="line">                return result</span><br><span class="line">        except:</span><br><span class="line">            continue</span><br><span class="line">        time.sleep(0.1) # 避免请求过快</span><br><span class="line">    return None</span><br><span class="line"></span><br><span class="line">def plot_element(ax, z, symbol):</span><br><span class="line">    ax.set_facecolor(&#x27;black&#x27;)</span><br><span class="line"></span><br><span class="line">    # 标注元素信息</span><br><span class="line">    ax.text(0.5, 0.8, f&quot;&#123;z&#125; &#123;symbol&#125;&quot;, color=&#x27;white&#x27;, transform=ax.transAxes,</span><br><span class="line">            ha=&#x27;center&#x27;, fontsize=7, fontweight=&#x27;bold&#x27;, alpha=0.9)</span><br><span class="line"></span><br><span class="line">    result = fetch_nist_data(symbol)</span><br><span class="line"></span><br><span class="line">    if result is not None:</span><br><span class="line">        try:</span><br><span class="line">            wls = result[&#x27;Observed&#x27;].quantity.value</span><br><span class="line">            # 清洗强度数据中的非数字字符 (例如 NIST 里的 &#x27;p&#x27;, &#x27;w&#x27; 等标注)</span><br><span class="line">            ints_raw = [str(i).split()[0] for i in result[&#x27;Rel.&#x27;]]</span><br><span class="line">            ints = []</span><br><span class="line">            for i in ints_raw:</span><br><span class="line">                try:</span><br><span class="line">                    # 只保留数字和点</span><br><span class="line">                    clean_i = float(&#x27;&#x27;.join(c for c in i if c.isdigit() or c==&#x27;.&#x27;))</span><br><span class="line">                    ints.append(clean_i)</span><br><span class="line">                except:</span><br><span class="line">                    ints.append(1.0)</span><br><span class="line"></span><br><span class="line">            # 强度对数处理：让弱线也能看见</span><br><span class="line">            ints = np.log10(np.array(ints) + 1)</span><br><span class="line">            max_i = np.max(ints) if len(ints) &gt; 0 else 1</span><br><span class="line"></span><br><span class="line">            for w, i in zip(wls, ints):</span><br><span class="line">                if 380 &lt;= w &lt;= 750:</span><br><span class="line">                    color = wavelength_to_rgb(w)</span><br><span class="line">                    # 线宽和透明度由物理强度决定</span><br><span class="line">                    ax.axvline(x=w, color=color, alpha=0.2 + (i/max_i)*0.8, linewidth=0.6)</span><br><span class="line">        except Exception:</span><br><span class="line">            ax.text(0.5, 0.2, &quot;Error&quot;, color=&#x27;red&#x27;, transform=ax.transAxes, ha=&#x27;center&#x27;, fontsize=5)</span><br><span class="line">    else:</span><br><span class="line">        # 如果依然没数据，通常是该元素在可见光波段确实无强谱线</span><br><span class="line">        ax.text(0.5, 0.2, &quot;N/A&quot;, color=&#x27;#444444&#x27;, transform=ax.transAxes, ha=&#x27;center&#x27;, fontsize=5)</span><br><span class="line"></span><br><span class="line">    ax.set_xlim(380, 750)</span><br><span class="line">    ax.set_xticks([]); ax.set_yticks([])</span><br><span class="line">    # 给外边框加一点暗色</span><br><span class="line">    for spine in ax.spines.values():</span><br><span class="line">        spine.set_edgecolor(&#x27;#222222&#x27;)</span><br><span class="line"></span><br><span class="line"># 3. 绘图主程序</span><br><span class="line">print(&quot;正在从 NIST 抓取 118 元素真实光谱数据，预计需要 2-3 分钟...&quot;)</span><br><span class="line">fig, axes = plt.subplots(10, 18, figsize=(26, 13), facecolor=&#x27;#050505&#x27;)</span><br><span class="line"></span><br><span class="line">for i, sym in enumerate(SYMBOLS, 1):</span><br><span class="line">    r, c = get_periodic_coords(i)</span><br><span class="line">    if r is not None:</span><br><span class="line">        print(f&quot;[&#123;i&#125;/118] 正在处理: &#123;sym&#125;...&quot;, end=&#x27;\r&#x27;)</span><br><span class="line">        plot_element(axes[r, c], i, sym)</span><br><span class="line"></span><br><span class="line"># 隐藏没有元素的格子</span><br><span class="line">for r in range(10):</span><br><span class="line">    for c in range(18):</span><br><span class="line">        if not axes[r,c].has_data():</span><br><span class="line">            axes[r,c].axis(&#x27;off&#x27;)</span><br><span class="line"></span><br><span class="line">plt.subplots_adjust(wspace=0.08, hspace=0.08, left=0.02, right=0.98, top=0.92)</span><br><span class="line">plt.suptitle(&quot;Scientific Periodic Table of Atomic Emission Spectra (NIST ASD Real Data)&quot;,</span><br><span class="line">             color=&#x27;white&#x27;, fontsize=28, fontweight=&#x27;light&#x27;)</span><br><span class="line"></span><br><span class="line"># 导出高质量 PDF (科研论文标准)</span><br><span class="line">plt.savefig(&quot;Periodic_Table_Spectra_Scientific.pdf&quot;, dpi=300)</span><br><span class="line">print(&quot;\n完成！高质量图像已保存为 Periodic_Table_Spectra_Scientific.pdf&quot;)</span><br><span class="line">plt.show()</span><br><span class="line"></span><br></pre></td></tr></table></figure>
